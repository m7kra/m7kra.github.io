<script>
// Redirec to to TypeX and Musicly and periodic if there were capitalization
// errors
let url = window.location.href;
// Remove last / if there is any
url = url.endsWith('/') ? url.slice(0, -1) : url;
const termination = url.split('/').pop().toLowerCase();
if (termination == 'typex') {
  window.location.replace('https://m7kra.github.io/TypeX');
} else if (termination == 'musicly') {
  window.location.replace('https://m7kra.github.io/Musicly');
} else if (termination == 'periodic') {
  window.location.replace('https://m7kra.github.io/periodic');
} else {
  // Redirect to home page
  window.location.replace('https://m7kra.github.io');
}
</script>
